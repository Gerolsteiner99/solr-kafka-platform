# Default values for kafka.

replicaCount: 1

storage:
  size: 5Gi

zookeeper:
  host: zookeeper
  port: 2181

image:
  repository: docker.io/bitnami/kafka
  pullPolicy: IfNotPresent
  tag: 3.7.0

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 9092

resources: {}

livenessProbe:
  tcpSocket:
    port: 9092

readinessProbe:
  tcpSocket:
    port: 9092

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

