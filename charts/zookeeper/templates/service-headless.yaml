apiVersion: v1
kind: Service
metadata:
  name: {{ include "zookeeper.fullname" . }}-headless
  labels:
    app: {{ include "zookeeper.name" . }}
spec:
  clusterIP: None
  selector:
    app: {{ include "zookeeper.name" . }}
  ports:
    - name: client
      port: 2181
      targetPort: 2181
    - name: quorum
      port: 2888
      targetPort: 2888
    - name: leader-election
      port: 3888
      targetPort: 3888

