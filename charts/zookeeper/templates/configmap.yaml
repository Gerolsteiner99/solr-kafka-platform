apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zookeeper.fullname" . }}-config
data:
  zoo.cfg: |
    tickTime=2000
    dataDir=/data
    dataLogDir=/datalog
    clientPort=2181
    initLimit=10
    syncLimit=5
    maxClientCnxns=60
    server.1={{ include "zookeeper.fullname" . }}-0.{{ include "zookeeper.fullname" . }}-headless:2888:3888

