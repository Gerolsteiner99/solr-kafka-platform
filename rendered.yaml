# Source: solr-kafka-platform/charts/kafka/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: solr-kafka
spec:
  serviceName: solr-kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka

  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: "192.168.1.75:30090/kafka:7.5.0"
          imagePullPolicy: IfNotPresent

          ports:
            - name: kafka
              containerPort: 9092

          env:
            # Pod-Name für advertised.listeners
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            # ENV-Variablen aus values.yaml
            - name: KAFKA_CFG_BROKER_ID
              value: "0"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "solrkafka-zookeeper-headless:2181"
            - name: KAFKA_OVERRIDE_zookeeper_connect
              value: "solrkafka-zookeeper-headless:2181"

            # Listener-Konfiguration
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092"

            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(POD_NAME).solr-kafka-headless:9092"

            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"

            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"

          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data

          resources:
            {}

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# Source: solr-kafka-platform/charts/solr/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: solrkafka-solr
  labels:
    app: solrkafka-solr
spec:
  serviceName: solrkafka-solr-headless
  replicas: 3
  selector:
    matchLabels:
      app: solrkafka-solr
  template:
    metadata:
      labels:
        app: solrkafka-solr
    spec:
      serviceAccountName: solrkafka-solr

      initContainers:
        - name: init-solr-data
          image: busybox
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          command: ["sh", "-c", "mkdir -p /var/solr/data && chown -R 8983:8983 /var/solr/data"]
          volumeMounts:
            - name: data
              mountPath: /var/solr/data

      containers:
        - name: solr
          image: "solr:9.4"
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8983

          env:
            - name: SOLR_MODE
              value: solrcloud
            - name: ZK_HOST
              value: ":"
            - name: SOLR_HEAP
              value: "512m"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

          # Solr im Foreground starten + Log4j2 fixen
          command: ["bash", "-c"]
          args:
            - >
              cp /opt/solr/server/resources/log4j2.xml /var/solr/log4j2.xml;
              /opt/solr/bin/solr start -cloud -f
              -z :;

          volumeMounts:
            - name: data
              mountPath: /var/solr/data

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
# Source: solr-kafka-platform/charts/zookeeper/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: solrkafka-zookeeper
spec:
  serviceName: solrkafka-zookeeper-headless
  replicas: 1
  selector:
    matchLabels:
      app: solrkafka-zookeeper

  template:
    metadata:
      labels:
        app: solrkafka-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: "docker.io/library/zookeeper:3.9.1"
          imagePullPolicy: IfNotPresent

          ports:
            - name: client
              containerPort: 2181
            - name: quorum
              containerPort: 2888
            - name: leader-election
              containerPort: 3888

          volumeMounts:
            - name: data
              mountPath: /data
            - name: datalog
              mountPath: /datalog
            - name: config
              mountPath: /conf/zoo.cfg
              subPath: zoo.cfg

      volumes:
        - name: config
          configMap:
            name: solrkafka-zookeeper-config

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

    - metadata:
        name: datalog
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
# Source: solr-kafka-platform/charts/solr/templates/cronjob-monthly-collection.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: solrkafka-solr-monthly-collections
spec:
  schedule: "0 0 1 * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: solr-collection-creator
              image: solr:latest
              command:
                - /bin/bash
                - -c
                - |
                  COLL=$(date +Coll-%m-%y)
                  echo "Erstelle Collection: $COLL"

                  solr create_collection \
                    -c "$COLL" \
                    --shards 2 \
                    --replication-factor 3 \
                    --solr-url http://solrkafka-solr:8983/solr
---
# Source: solr-kafka-platform/charts/solr/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solrkafka-solr
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: solr.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: solrkafka-solr
                port:
                  number: 8983
